<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ส่งผลสัมฤทธิ์ | โรงเรียนวัดเลียบ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy-50: #eef3f9;
      --navy-100: #dbe6f2;
      --navy-300: #9fb4cc;
      --navy-500: #456b91;
      --navy-700: #1f3d5a;
      --slate-100: #edf2f7;
      --slate-200: #d8e1ea;
      --slate-700: #415466;
      --cream: #f7f4ee;
      --text: #243447;
      --white: #ffffff;
      --shadow: 0 18px 45px rgba(31, 61, 90, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans Thai", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(219, 230, 242, 0.82), rgba(247, 244, 238, 0.96)),
        linear-gradient(135deg, #eef3f9, #f7f4ee 55%, #e3eaf2);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: min(100%, 720px);
      background: rgba(255, 255, 255, 0.94);
      border-radius: 30px;
      box-shadow: var(--shadow);
      padding: 28px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(159, 180, 204, 0.35);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 999px;
      text-decoration: none;
      color: var(--navy-700);
      background: var(--navy-50);
      font-weight: 700;
      margin-bottom: 18px;
      border: 1px solid rgba(159, 180, 204, 0.45);
    }

    .hero {
      text-align: center;
      margin-bottom: 24px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 42px);
      color: var(--navy-700);
    }

    .hero p {
      margin: 0;
      color: #5a6776;
      line-height: 1.7;
    }

    form {
      display: grid;
      gap: 18px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .room-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
    }

    .room-option {
      position: relative;
    }

    .room-option input[type="radio"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .room-label {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 58px;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(159, 180, 204, 0.35);
      background: rgba(255, 255, 255, 0.9);
      color: var(--navy-700);
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .room-label:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(31, 61, 90, 0.12);
    }

    .room-option input[type="radio"]:checked + .room-label {
      background: linear-gradient(135deg, var(--navy-500), var(--navy-700));
      color: var(--white);
      border-color: transparent;
      box-shadow: 0 12px 28px rgba(31, 61, 90, 0.18);
    }

    label {
      font-weight: 700;
      color: var(--slate-700);
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(159, 180, 204, 0.4);
      background: rgba(247, 249, 252, 0.98);
      font-family: "Noto Sans Thai", sans-serif;
      font-size: 16px;
      color: var(--text);
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--navy-500);
      box-shadow: 0 0 0 4px rgba(69, 107, 145, 0.12);
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .button {
      border: none;
      border-radius: 999px;
      padding: 12px 22px;
      font-family: "Noto Sans Thai", sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .button-primary {
      background: linear-gradient(135deg, var(--navy-500), var(--navy-700));
      color: var(--white);
    }

    .button-secondary {
      background: var(--slate-100);
      color: var(--slate-700);
      border: 1px solid rgba(159, 180, 204, 0.35);
    }

    .note {
      margin-top: 8px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(238, 243, 249, 0.88);
      color: #526170;
      line-height: 1.7;
      font-size: 15px;
      border: 1px solid rgba(159, 180, 204, 0.28);
    }

    .teacher-choice-wrap {
      display: grid;
      gap: 12px;
    }

    .teacher-buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
    }

    .teacher-btn {
      border: 1px solid rgba(159, 180, 204, 0.32);
      background: rgba(255, 255, 255, 0.9);
      color: var(--navy-700);
      border-radius: 14px;
      padding: 12px 14px;
      font-family: "Noto Sans Thai", sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      text-align: center;
    }

    .teacher-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(31, 61, 90, 0.12);
    }

    .teacher-btn.active {
      background: linear-gradient(135deg, var(--navy-500), var(--navy-700));
      color: var(--white);
      border-color: transparent;
    }

    .teacher-subject {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(247, 249, 252, 0.96);
      border: 1px solid rgba(159, 180, 204, 0.28);
      color: #526170;
      line-height: 1.6;
      min-height: 56px;
    }

    .teacher-subject.hidden {
      display: none;
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .card {
        padding: 20px;
        border-radius: 22px;
      }

      .actions {
        flex-direction: column;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <a class="back-link" href="index.html">← กลับหน้าหลัก</a>

    <section class="hero">
      <h1>ส่งผลสัมฤทธิ์</h1>
      <p>เลือกห้องเรียนและครูผู้สอน จากนั้นกดปุ่มเพื่อไปยังหน้ากรอกคะแนนรายวิชา</p>
    </section>

    <form action="">
      <div class="field">
        <label>เลือกห้องเรียน</label>
        <div class="room-grid">
          <label class="room-option">
            <input type="radio" name="classroom" value="ชั้นประถมศึกษาปีที่ 1" data-teacher="👑 ครูเกษร" checked>
            <span class="room-label">ป.1</span>
          </label>
          <label class="room-option">
            <input type="radio" name="classroom" value="ชั้นประถมศึกษาปีที่ 2" data-teacher="👑 ครูนุสริน">
            <span class="room-label">ป.2</span>
          </label>
          <label class="room-option">
            <input type="radio" name="classroom" value="ชั้นประถมศึกษาปีที่ 3" data-teacher="👑 ครูชมพูนุช">
            <span class="room-label">ป.3</span>
          </label>
          <label class="room-option">
            <input type="radio" name="classroom" value="ชั้นประถมศึกษาปีที่ 4" data-teacher="👑 ครูนญิลา">
            <span class="room-label">ป.4</span>
          </label>
          <label class="room-option">
            <input type="radio" name="classroom" value="ชั้นประถมศึกษาปีที่ 5" data-teacher="👑 ครูณิชชาวีร์">
            <span class="room-label">ป.5</span>
          </label>
          <label class="room-option">
            <input type="radio" name="classroom" value="ชั้นประถมศึกษาปีที่ 6" data-teacher="👑 ครูวรลักษณ์">
            <span class="room-label">ป.6</span>
          </label>
          <label class="room-option">
            <input type="radio" name="classroom" value="ห้องพิเศษเรียนรวม" data-teacher="👑 ครูปาริชาต">
            <span class="room-label">ห้องพิเศษเรียนรวม</span>
          </label>
        </div>
      </div>

      <div class="field">
        <label>เลือกครูผู้สอน</label>
        <div class="teacher-choice-wrap">
          <div class="teacher-buttons" id="teacherButtons"></div>
          <div class="teacher-subject" id="teacherSubject">เลือกครูผู้สอนเพื่อดูวิชาที่สอน</div>
        </div>
      </div>

      <div class="actions">
        <button class="button button-primary" type="button" id="scoreButton">กรอกคะแนนรายวิชา</button>
        <a class="button button-secondary" href="index.html">Back กลับหน้าหลัก</a>
      </div>
    </form>

    <div class="note">
      ตอนนี้เชื่อมลิงก์กรอกคะแนนสำหรับบางห้องแล้ว ส่วนห้องหรือวิชาอื่น ๆ สามารถเพิ่มลิงก์ต่อได้ภายหลัง
    </div>
  </main>

  <script>
    (function () {
      var scoreButton = document.getElementById("scoreButton");
      var teacherButtons = document.getElementById("teacherButtons");
      var teacherSubject = document.getElementById("teacherSubject");
      var radios = document.querySelectorAll('input[name="classroom"]');
      if (!radios.length) return;

      var selectedTeacherLink = "";

      var subjectTeachers = {
        "ชั้นประถมศึกษาปีที่ 1": [
          { teacher: "👑 ครูเกษร", subject: "ครูประจำชั้น", link: "https://docs.google.com/spreadsheets/d/1cPnVKOhwy4bEnnHLJ16cIcjUIe84kTnS7aFMnCcooqo/edit?usp=sharing" },
          { teacher: "ครูนญิลา", subject: "ภาษาอังกฤษ", link: "https://docs.google.com/spreadsheets/d/1cPnVKOhwy4bEnnHLJ16cIcjUIe84kTnS7aFMnCcooqo/edit?gid=1979006343#gid=1979006343&range=C7:P9" },
          { teacher: "ครูณิชชาวีร์", subject: "วิทยาศาสตร์", link: "https://docs.google.com/spreadsheets/d/1cPnVKOhwy4bEnnHLJ16cIcjUIe84kTnS7aFMnCcooqo/edit?gid=39720#gid=39720&range=C7:P9" }
        ],
        "ชั้นประถมศึกษาปีที่ 2": [
          { teacher: "👑 ครูนุสริน", subject: "ครูประจำชั้น", link: "https://docs.google.com/spreadsheets/d/1IYFPTIwzA3znrhrcnz3BZ250WZkpsPzV_RwD6W64RQo/edit?usp=sharing" },
          { teacher: "ครูชมพูนุช", subject: "ภาษาอังกฤษ", link: "https://docs.google.com/spreadsheets/d/1IYFPTIwzA3znrhrcnz3BZ250WZkpsPzV_RwD6W64RQo/edit?gid=1979006343#gid=1979006343&range=C7:P22" },
          { teacher: "ครูฮานี", subject: "คณิตศาสตร์", link: "https://docs.google.com/spreadsheets/d/1IYFPTIwzA3znrhrcnz3BZ250WZkpsPzV_RwD6W64RQo/edit?gid=406176090#gid=406176090&range=C7:P22" },
          { teacher: "ครูณิชชาวีร์", subject: "วิทยาศาสตร์", link: "https://docs.google.com/spreadsheets/d/1IYFPTIwzA3znrhrcnz3BZ250WZkpsPzV_RwD6W64RQo/edit?gid=39720#gid=39720&range=C7:P22" }
        ],
        "ชั้นประถมศึกษาปีที่ 3": [
          { teacher: "👑 ครูชมพูนุช", subject: "ครูประจำชั้น", link: "https://docs.google.com/spreadsheets/d/1U_tk0moCZNS6R5ZJkoN-8ZpGqvb9wDyN1LSlOGsyOHg/edit?usp=sharing" },
          { teacher: "ครูนุสริน", subject: "ภาษาไทย", link: "https://docs.google.com/spreadsheets/d/1U_tk0moCZNS6R5ZJkoN-8ZpGqvb9wDyN1LSlOGsyOHg/edit?gid=1075589960#gid=1075589960&range=C7:P14" },
          { teacher: "ครูเกษร", subject: "การงานอาชีพ", link: "https://docs.google.com/spreadsheets/d/1U_tk0moCZNS6R5ZJkoN-8ZpGqvb9wDyN1LSlOGsyOHg/edit?gid=1487086655#gid=1487086655&range=C7:P14" },
          { teacher: "ครูณิชชาวีร์", subject: "วิทยาศาสตร์", link: "https://docs.google.com/spreadsheets/d/1U_tk0moCZNS6R5ZJkoN-8ZpGqvb9wDyN1LSlOGsyOHg/edit?gid=39720#gid=39720&range=C7:P14" }
        ],
        "ชั้นประถมศึกษาปีที่ 4": [
          { teacher: "👑 ครูนญิลา", subject: "ครูประจำชั้น", link: "" },
          { teacher: "ครูฮานี", subject: "คณิตศาสตร์, สุขศึกษา", link: "" },
          { teacher: "ครูวรลักษณ์", subject: "ภาษาไทย", link: "" },
          { teacher: "ครูเกษร", subject: "การงานอาชีพ", link: "" },
          { teacher: "ครูณิชชาวีร์", subject: "วิทยาศาสตร์", link: "" }
        ],
        "ชั้นประถมศึกษาปีที่ 5": [
          { teacher: "👑 ครูณิชชาวีร์", subject: "ครูประจำชั้น", link: "" },
          { teacher: "ครูฮานี", subject: "คณิตศาสตร์, สุขศึกษา", link: "" },
          { teacher: "ครูวรลักษณ์", subject: "ภาษาไทย", link: "" },
          { teacher: "ครูนญิลา", subject: "ภาษาอังกฤษ", link: "" },
          { teacher: "ครูนุสริน", subject: "สังคมศึกษาฯ", link: "" },
          { teacher: "ครูเกษร", subject: "การงานอาชีพ", link: "" }
        ],
        "ชั้นประถมศึกษาปีที่ 6": [
          { teacher: "👑 ครูวรลักษณ์", subject: "ครูประจำชั้น", link: "" },
          { teacher: "ครูฮานี", subject: "คณิตศาสตร์, สุขศึกษา", link: "" },
          { teacher: "ครูนญิลา", subject: "ภาษาอังกฤษ", link: "" },
          { teacher: "ครูณิชชาวีร์", subject: "วิทยาศาสตร์", link: "" }
        ],
        "ห้องพิเศษเรียนรวม": [
          { teacher: "👑 ครูปาริชาต", subject: "", link: "" }
        ]
      };

      function updateTeacher() {
        var selected = document.querySelector('input[name="classroom"]:checked');
        if (!selected) return;

        if (!teacherButtons || !teacherSubject) return;

        var items = subjectTeachers[selected.value] || [];
        teacherButtons.innerHTML = "";

        if (!items.length) {
          teacherSubject.classList.remove("hidden");
          teacherSubject.textContent = "ห้องนี้ยังไม่ได้ระบุครูผู้สอนรายวิชาเพิ่มเติม";
          return;
        }

        teacherSubject.classList.remove("hidden");
        teacherSubject.textContent = "เลือกครูผู้สอนเพื่อดูวิชาที่สอน";

        items.forEach(function (item, index) {
          var button = document.createElement("button");
          button.type = "button";
          button.className = "teacher-btn";
          button.textContent = item.teacher;
          button.addEventListener("click", function () {
            var allButtons = teacherButtons.querySelectorAll(".teacher-btn");
            allButtons.forEach(function (btn) {
              btn.classList.remove("active");
            });
            button.classList.add("active");

            if (!item.subject) {
              selectedTeacherLink = "";
              teacherSubject.textContent = "";
              teacherSubject.classList.add("hidden");
              return;
            }

            selectedTeacherLink = item.link || "";
            teacherSubject.classList.remove("hidden");
            teacherSubject.textContent = item.subject === "ครูประจำชั้น"
              ? " ครูประจำชั้น "
              : " ครูผู้สอนวิชา " + item.subject;
          });
          teacherButtons.appendChild(button);

          if (index === 0) {
            button.classList.add("active");
            if (!item.subject) {
              selectedTeacherLink = "";
              teacherSubject.textContent = "";
              teacherSubject.classList.add("hidden");
            } else {
              selectedTeacherLink = item.link || "";
              teacherSubject.classList.remove("hidden");
              teacherSubject.textContent = item.subject === "ครูประจำชั้น"
                ? " ครูประจำชั้น "
                : " ครูผู้สอนวิชา " + item.subject;
            }
          }
        });
      }

      radios.forEach(function (radio) {
        radio.addEventListener("change", updateTeacher);
      });

      if (scoreButton) {
        scoreButton.addEventListener("click", function () {
          if (selectedTeacherLink) {
            window.open(selectedTeacherLink, "_blank");
            return;
          }

          alert("ผู้ดูแลระบบยังไม่ได้ใส่ลิงก์กรอกคะแนนรายวิชา");
        });
      }

      updateTeacher();
    })();
  </script>
</body>
</html>
