<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ส่งผลสัมฤทธิ์ | โรงเรียนวัดเลียบ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy-50: #eef3f9;
      --navy-100: #dbe6f2;
      --navy-300: #9fb4cc;
      --navy-500: #456b91;
      --navy-700: #1f3d5a;
      --slate-100: #edf2f7;
      --slate-200: #d8e1ea;
      --slate-700: #415466;
      --cream: #f7f4ee;
      --text: #243447;
      --white: #ffffff;
      --shadow: 0 18px 45px rgba(31, 61, 90, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans Thai", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(219, 230, 242, 0.82), rgba(247, 244, 238, 0.96)),
        linear-gradient(135deg, #eef3f9, #f7f4ee 55%, #e3eaf2);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: min(100%, 720px);
      background: rgba(255, 255, 255, 0.94);
      border-radius: 30px;
      box-shadow: var(--shadow);
      padding: 28px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(159, 180, 204, 0.35);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 999px;
      text-decoration: none;
      color: var(--navy-700);
      background: var(--navy-50);
      font-weight: 700;
      margin-bottom: 18px;
      border: 1px solid rgba(159, 180, 204, 0.45);
    }

    .hero {
      text-align: center;
      margin-bottom: 24px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 42px);
      color: var(--navy-700);
    }

    .hero p {
      margin: 0;
      color: #5a6776;
      line-height: 1.7;
    }

    form {
      display: grid;
      gap: 18px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .mode-switch {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .mode-btn {
      border: 1px solid rgba(159, 180, 204, 0.35);
      background: rgba(255, 255, 255, 0.9);
      color: var(--navy-700);
      border-radius: 16px;
      padding: 13px 14px;
      font-family: "Noto Sans Thai", sans-serif;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .mode-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(31, 61, 90, 0.12);
    }

    .mode-btn.active {
      background: linear-gradient(135deg, var(--navy-500), var(--navy-700));
      color: var(--white);
      border-color: transparent;
      box-shadow: 0 12px 28px rgba(31, 61, 90, 0.18);
    }

    .room-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
    }

    .room-option {
      position: relative;
    }

    .room-option input[type="radio"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .room-label {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 58px;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(159, 180, 204, 0.35);
      background: rgba(255, 255, 255, 0.9);
      color: var(--navy-700);
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .room-label:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(31, 61, 90, 0.12);
    }

    .room-option input[type="radio"]:checked + .room-label {
      background: linear-gradient(135deg, var(--navy-500), var(--navy-700));
      color: var(--white);
      border-color: transparent;
      box-shadow: 0 12px 28px rgba(31, 61, 90, 0.18);
    }

    label {
      font-weight: 700;
      color: var(--slate-700);
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(159, 180, 204, 0.4);
      background: rgba(247, 249, 252, 0.98);
      font-family: "Noto Sans Thai", sans-serif;
      font-size: 16px;
      color: var(--text);
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--navy-500);
      box-shadow: 0 0 0 4px rgba(69, 107, 145, 0.12);
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .button {
      border: none;
      border-radius: 999px;
      padding: 12px 22px;
      font-family: "Noto Sans Thai", sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .button-primary {
      background: linear-gradient(135deg, var(--navy-500), var(--navy-700));
      color: var(--white);
    }

    .button-secondary {
      background: var(--slate-100);
      color: var(--slate-700);
      border: 1px solid rgba(159, 180, 204, 0.35);
    }

    .note {
      margin-top: 8px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(238, 243, 249, 0.88);
      color: #526170;
      line-height: 1.7;
      font-size: 15px;
      border: 1px solid rgba(159, 180, 204, 0.28);
    }

    .teacher-display {
      padding: 16px 18px;
      border-radius: 18px;
      background: linear-gradient(180deg, #fff, #fff7fa);
      border: 1px solid rgba(239, 185, 203, 0.8);
      color: var(--text);
      min-height: 84px;
      display: grid;
      align-content: center;
      gap: 6px;
    }

    .teacher-display strong {
      color: var(--rose-700);
      font-size: 18px;
    }

    .teacher-display span {
      color: #6b5961;
      font-size: 14px;
    }

    .teacher-choice-wrap {
      display: grid;
      gap: 12px;
    }

    .teacher-buttons,
    .subject-buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
    }

    .teacher-btn,
    .subject-btn {
      border: 1px solid rgba(159, 180, 204, 0.32);
      background: rgba(255, 255, 255, 0.9);
      color: var(--navy-700);
      border-radius: 14px;
      padding: 12px 14px;
      font-family: "Noto Sans Thai", sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      text-align: center;
    }

    .teacher-btn:hover,
    .subject-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(31, 61, 90, 0.12);
    }

    .teacher-btn.active,
    .subject-btn.active {
      background: linear-gradient(135deg, var(--navy-500), var(--navy-700));
      color: var(--white);
      border-color: transparent;
    }

    .subject-btn.locked {
      background: rgba(247, 249, 252, 0.98);
      color: #6d7b8a;
      border-style: dashed;
    }

    .selector-panel.hidden {
      display: none;
    }

    .teacher-subject {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(247, 249, 252, 0.96);
      border: 1px solid rgba(159, 180, 204, 0.28);
      color: #526170;
      line-height: 1.6;
      min-height: 56px;
    }

    .teacher-subject.hidden {
      display: none;
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .card {
        padding: 20px;
        border-radius: 22px;
      }

      .actions {
        flex-direction: column;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>

  <main class="card">
    <a class="back-link" href="index.html">← กลับหน้าหลัก</a>

    <section class="hero">

      </div>

      <div class="field">
        <label id="selectorLabel">เลือกห้องเรียน</label>
        <div class="selector-panel" id="roomSelector">
          <div class="room-grid">
            <label class="room-option">
              <input type="radio" name="classroom" value="ชั้นประถมศึกษาปีที่ 1" checked>
              <span class="room-label">ป.1</span>
            </label>
            <label class="room-option">
              <input type="radio" name="classroom" value="ชั้นประถมศึกษาปีที่ 2">
              <span class="room-label">ป.2</span>
            </label>
            <label class="room-option">
              <input type="radio" name="classroom" value="ชั้นประถมศึกษาปีที่ 3">
              <span class="room-label">ป.3</span>
            </label>
            <label class="room-option">
              <input type="radio" name="classroom" value="ชั้นประถมศึกษาปีที่ 4">
              <span class="room-label">ป.4</span>
            </label>
            <label class="room-option">
              <input type="radio" name="classroom" value="ชั้นประถมศึกษาปีที่ 5">
              <span class="room-label">ป.5</span>
            </label>
            <label class="room-option">
              <input type="radio" name="classroom" value="ชั้นประถมศึกษาปีที่ 6">
              <span class="room-label">ป.6</span>
            </label>
            <label class="room-option">
              <input type="radio" name="classroom" value="ห้องพิเศษเรียนรวม">
              <span class="room-label">ห้องพิเศษเรียนรวม</span>
            </label>
          </div>
        </div>

        <div class="selector-panel hidden" id="subjectSelector">
          <div class="subject-buttons" id="subjectButtons"></div>
        </div>
      </div>

      <div class="field" id="teacherField">
        <label>เลือกครูผู้สอน</label>
        <div class="teacher-choice-wrap">
          <div class="teacher-buttons" id="teacherButtons"></div>
          <div class="teacher-subject" id="teacherSubject">เลือกครูผู้สอนเพื่อดูวิชาที่สอน</div>
        </div>
      </div>

      <div class="actions">
        <button class="button button-primary" type="button" id="scoreButton">กรอกคะแนนรายวิชา</button>
      </div>
    </form>

    <div class="note">
      หากวิชาใดยังไม่มีลิงก์กรอกคะแนน ระบบจะแจ้งเตือนก่อนเปิดหน้าใหม่ และสามารถเพิ่มลิงก์ในภายหลังได้
    </div>
  </main>

        { subject: "เทคโนโลยี", link: "" }
      ];

      function updateSubjectTeacherOptions(subjectItem) {
        if (!teacherButtons || !teacherSubject) return;

        teacherButtons.innerHTML = "";
        currentSubjectName = subjectItem.subject;

        if (subjectItem.subject === "วิทยาศาสตร์") {
          var teacherButton = document.createElement("button");
          teacherButton.type = "button";
          teacherButton.className = "teacher-btn active";
          teacherButton.textContent = "ครูณิชชาวีร์";
          teacherButtons.appendChild(teacherButton);

          selectedTeacherLink = subjectItem.link || "";
          teacherSubject.classList.add("hidden");
          return;
        }

        selectedTeacherLink = subjectItem.link || "";
        teacherSubject.classList.remove("hidden");
        teacherSubject.textContent = subjectItem.link
          ? "วิชา " + subjectItem.subject
          : "วิชา " + subjectItem.subject + " ยังไม่ได้ใส่ลิงก์กรอกคะแนน";
      }

      function renderSubjectButtons() {
        if (!subjectButtons || !teacherSubject) return;

        subjectButtons.innerHTML = "";
        teacherSubject.classList.remove("hidden");
        teacherSubject.textContent = "เลือกวิชาเพื่อเปิดหน้ากรอกคะแนน";
        selectedTeacherLink = "";
        teacherButtons.innerHTML = "";

        subjectLinks.forEach(function (item, index) {
          var button = document.createElement("button");
          button.type = "button";
          button.className = "subject-btn";
          if (!item.link) button.classList.add("locked");
          button.textContent = item.link ? item.subject : "🔒 " + item.subject;

          button.addEventListener("click", function () {
            var allButtons = subjectButtons.querySelectorAll(".subject-btn");
            allButtons.forEach(function (btn) {
              btn.classList.remove("active");
            });
            button.classList.add("active");
            updateSubjectTeacherOptions(item);
          });

          subjectButtons.appendChild(button);

          if (index === 0) {
            button.classList.add("active");
            updateSubjectTeacherOptions(item);
          }
        });
      }

      function updateTeacher() {
        var selected = document.querySelector('input[name="classroom"]:checked');
        if (!selected) return;
        if (!teacherButtons || !teacherSubject) return;

        var items = subjectTeachers[selected.value] || [];
        teacherButtons.innerHTML = "";

        if (!items.length) {
          teacherSubject.classList.remove("hidden");
          teacherSubject.textContent = "ห้องนี้ยังไม่ได้ระบุครูผู้สอนรายวิชาเพิ่มเติม";
          return;
        }

        teacherSubject.classList.remove("hidden");
        teacherSubject.textContent = "เลือกครูผู้สอนเพื่อดูวิชาที่สอน";

        items.forEach(function (item, index) {
          var button = document.createElement("button");
          button.type = "button";
          button.className = "teacher-btn";
          button.textContent = item.teacher;
          button.addEventListener("click", function () {
            var allButtons = teacherButtons.querySelectorAll(".teacher-btn");
            allButtons.forEach(function (btn) {
              btn.classList.remove("active");
            });
            button.classList.add("active");

            if (!item.subject) {
              selectedTeacherLink = "";
              teacherSubject.textContent = "";
              teacherSubject.classList.add("hidden");
              return;
            }

            selectedTeacherLink = item.link || "";
            teacherSubject.classList.remove("hidden");
            teacherSubject.textContent = item.subject === "ครูประจำชั้น"
              ? item.teacher
              : item.teacher + " สอนวิชา " + item.subject;
          });

          teacherButtons.appendChild(button);

          if (index === 0) {
            button.classList.add("active");
            if (!item.subject) {
              selectedTeacherLink = "";
              teacherSubject.textContent = "";
              teacherSubject.classList.add("hidden");
            } else {
              selectedTeacherLink = item.link || "";
              teacherSubject.classList.remove("hidden");
              teacherSubject.textContent = item.subject === "ครูประจำชั้น"
                ? item.teacher
                : item.teacher + " สอนวิชา " + item.subject;
            }
          }
        });
      }

      function switchMode(mode) {
        currentMode = mode;
        var isRoomMode = mode === "room";

        roomModeBtn.classList.toggle("active", isRoomMode);
        subjectModeBtn.classList.toggle("active", !isRoomMode);
        roomSelector.classList.toggle("hidden", !isRoomMode);
        subjectSelector.classList.toggle("hidden", isRoomMode);
        selectorLabel.textContent = isRoomMode ? "เลือกห้องเรียน" : "เลือกรายวิชา";

        if (isRoomMode) {
          teacherField.classList.remove("hidden");
          updateTeacher();
        } else {
          teacherField.classList.remove("hidden");
          renderSubjectButtons();
        }
      }

      radios.forEach(function (radio) {
        radio.addEventListener("change", updateTeacher);
      });

      roomModeBtn.addEventListener("click", function () {
        switchMode("room");
      });

      subjectModeBtn.addEventListener("click", function () {
        switchMode("subject");
      });

      if (scoreButton) {
        scoreButton.addEventListener("click", function () {
          if (selectedTeacherLink) {
            window.open(selectedTeacherLink, "_blank");
            return;
          }

          alert(currentMode === "room"
            ? "ครูหรือวิชานี้ยังไม่ได้ใส่ลิงก์กรอกคะแนนรายวิชา"
            : "รายวิชานี้ยังไม่ได้ใส่ลิงก์กรอกคะแนน");
        });
      }

      updateTeacher();
    })();
  </script>
</body>
</html>
