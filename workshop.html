<!doctype html>
<html lang="th" class="h-full">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonics Adventure</title>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <script src="/_sdk/element_sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --sky: #72d7ff;
        --sky-soft: #c9f6ff;
        --grass: #74d96f;
        --ink: #1b315d;
        --paper: #ffffff;
        --sun: #ffd84d;
        --coral: #ff6f91;
        --mint: #2fd7a5;
        --blue: #3478ff;
        --purple: #8b5cf6;
        --shadow: rgba(26, 47, 91, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      body {
        margin: 0;
        font-family: "Nunito", "Sarabun", system-ui, sans-serif;
        font-weight: 800;
        color: var(--ink);
        background: var(--sky-soft);
      }

      button {
        font: inherit;
      }

      .hidden {
        display: none !important;
      }

      .app {
        min-height: 100%;
        position: relative;
        overflow: auto;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0) 48%),
          linear-gradient(180deg, var(--sky) 0%, var(--sky-soft) 64%, #dbffd3 64%, var(--grass) 100%);
      }

      .world-bg {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }

      .screen {
        position: relative;
        z-index: 1;
        min-height: 100%;
        padding: 24px;
      }

      .start-screen,
      .result-screen {
        display: grid;
        place-items: center;
      }

      .start-shell {
        width: min(1080px, 100%);
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(300px, 440px);
        gap: 28px;
        align-items: center;
      }

      .brand-chip {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 9px 14px;
        border-radius: 8px;
        color: #11325f;
        background: rgba(255, 255, 255, 0.76);
        border: 3px solid rgba(255, 255, 255, 0.92);
        box-shadow: 0 10px 24px var(--shadow);
      }

      .hero-title {
        margin: 18px 0 8px;
        font-size: 3.8rem;
        line-height: 1;
        font-weight: 900;
        color: #12366d;
        text-shadow: 0 4px 0 rgba(255, 255, 255, 0.85);
      }

      .hero-subtitle {
        margin: 0 0 10px;
        font-family: "Sarabun", "Nunito", sans-serif;
        font-size: 1.65rem;
        line-height: 1.3;
        color: #0b4a77;
      }

      .hero-copy {
        max-width: 620px;
      }

      .hero-note {
        margin: 0 0 22px;
        font-family: "Sarabun", "Nunito", sans-serif;
        font-size: 1.12rem;
        line-height: 1.65;
        color: #24415f;
        font-weight: 700;
      }

      .hero-name {
        color: #c01855;
        font-weight: 900;
      }

      .info-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin: 0 0 22px;
      }

      .info-tile {
        min-height: 96px;
        padding: 12px 10px;
        display: grid;
        gap: 6px;
        align-content: center;
        justify-items: center;
        text-align: center;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
        border: 3px solid rgba(255, 255, 255, 0.95);
        box-shadow: 0 10px 22px var(--shadow);
      }

      .info-tile strong {
        display: block;
        font-size: 1rem;
        line-height: 1.22;
        color: #163862;
      }

      .tile-icon {
        width: 36px;
        height: 36px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        color: #173a6a;
        background: var(--sun);
        box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.08);
      }

      .tile-icon.coral {
        background: #ff8cab;
      }

      .tile-icon.mint {
        background: #5ee5b6;
      }

      .tile-icon.blue {
        background: #7bb0ff;
      }

      .primary-cta,
      .secondary-cta {
        border: 0;
        border-radius: 8px;
        min-height: 58px;
        padding: 0 26px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        cursor: pointer;
        font-size: 1.25rem;
        font-weight: 900;
        color: #102b4f;
        background: linear-gradient(180deg, #ffe66b 0%, #ffc43d 100%);
        box-shadow: 0 10px 0 #d88700, 0 18px 26px rgba(110, 79, 0, 0.22);
        transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
      }

      .primary-cta:hover,
      .secondary-cta:hover {
        transform: translateY(-3px);
        filter: saturate(1.08);
        box-shadow: 0 13px 0 #d88700, 0 22px 30px rgba(110, 79, 0, 0.26);
      }

      .primary-cta:active,
      .secondary-cta:active {
        transform: translateY(4px);
        box-shadow: 0 5px 0 #d88700, 0 10px 18px rgba(110, 79, 0, 0.22);
      }

      .mascot-stage,
      .scene-panel,
      .result-panel {
        border-radius: 8px;
        border: 4px solid rgba(255, 255, 255, 0.95);
        background: rgba(255, 255, 255, 0.78);
        box-shadow: 0 18px 42px var(--shadow);
      }

      .mascot-stage {
        min-height: 500px;
        padding: 14px;
        display: grid;
        place-items: center;
        position: relative;
        overflow: hidden;
      }

      .mascot-stage::after {
        content: "";
        position: absolute;
        inset: auto 18px 16px;
        height: 12px;
        border-radius: 8px;
        background: rgba(20, 80, 120, 0.11);
      }

      .start-graphic,
      .level-graphic {
        width: 100%;
        height: auto;
        display: block;
      }

      .game-screen {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .topbar {
        width: min(1120px, 100%);
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .score-pill,
      .level-pill {
        min-height: 52px;
        padding: 8px 14px;
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: rgba(255, 255, 255, 0.86);
        border: 3px solid rgba(255, 255, 255, 0.96);
        color: #173a6a;
        box-shadow: 0 10px 22px var(--shadow);
      }

      .score-pill strong,
      .level-pill strong {
        font-size: 1.35rem;
        color: #163862;
      }

      .progress-track {
        width: min(1120px, 100%);
        height: 18px;
        margin: 0 auto 2px;
        padding: 3px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.78);
        border: 3px solid rgba(255, 255, 255, 0.95);
        box-shadow: 0 10px 22px var(--shadow);
      }

      .progress-fill {
        width: 0;
        height: 100%;
        border-radius: 6px;
        background: repeating-linear-gradient(135deg, #ff6f91 0 18px, #ffd84d 18px 36px, #35d8aa 36px 54px, #3478ff 54px 72px);
        transition: width 420ms ease;
      }

      .level-content {
        flex: 1;
        width: min(1120px, 100%);
        margin: 0 auto;
        display: grid;
        align-items: center;
      }

      .level-board {
        display: grid;
        grid-template-columns: minmax(280px, 0.86fr) minmax(320px, 1fr);
        gap: 20px;
        align-items: center;
      }

      .scene-panel {
        min-height: 440px;
        padding: 18px;
        display: grid;
        align-content: center;
        overflow: hidden;
      }

      .scene-label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin: 0 0 8px;
        color: #173a6a;
      }

      .scene-label span:first-child {
        font-size: 1rem;
        padding: 6px 10px;
        border-radius: 8px;
        color: #173a6a;
        background: #ffe66b;
      }

      .sound-badge {
        padding: 6px 10px;
        border-radius: 8px;
        color: #ffffff;
        background: #3478ff;
        box-shadow: inset 0 -3px 0 rgba(0, 0, 0, 0.12);
      }

      .quiz-area {
        color: var(--ink);
      }

      .mission-tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin: 0 0 10px;
        padding: 8px 12px;
        border-radius: 8px;
        color: #ffffff;
        background: #c01855;
        box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.12);
      }

      .level-title {
        margin: 0;
        font-size: 2.25rem;
        line-height: 1.12;
        color: #12366d;
        text-shadow: 0 3px 0 rgba(255, 255, 255, 0.88);
      }

      .level-subtitle {
        margin: 6px 0 18px;
        color: #2e5f84;
        font-size: 1.08rem;
      }

      .question-strip {
        margin-bottom: 16px;
        padding: 16px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        border-radius: 8px;
        background: #ffffff;
        border: 4px solid #ffd84d;
        box-shadow: 0 12px 24px var(--shadow);
      }

      .question-strip p {
        margin: 0;
      }

      .question-text {
        font-family: "Sarabun", "Nunito", sans-serif;
        font-size: 1.6rem;
        line-height: 1.3;
        color: #153a67;
      }

      .phonetic-chip {
        min-width: 98px;
        min-height: 62px;
        padding: 8px 12px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: #ffffff;
        background: #3478ff;
        font-size: 1.75rem;
        font-weight: 900;
        box-shadow: inset 0 -5px 0 rgba(0, 0, 0, 0.14);
      }

      .choices {
        display: grid;
        gap: 10px;
      }

      .choice-btn {
        width: 100%;
        min-height: 74px;
        padding: 10px 14px;
        border: 4px solid #ffffff;
        border-radius: 8px;
        display: grid;
        grid-template-columns: 54px minmax(0, 1fr) 34px;
        align-items: center;
        gap: 12px;
        text-align: left;
        color: #14345f;
        cursor: pointer;
        background: #ffffff;
        box-shadow: 0 9px 0 #bed7e8, 0 16px 24px rgba(31, 73, 117, 0.16);
        transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease, background 160ms ease;
      }

      .choice-btn:hover {
        transform: translateY(-4px);
        border-color: #ffd84d;
        box-shadow: 0 13px 0 #bed7e8, 0 20px 28px rgba(31, 73, 117, 0.2);
      }

      .choice-btn:active {
        transform: translateY(3px);
        box-shadow: 0 5px 0 #bed7e8, 0 11px 18px rgba(31, 73, 117, 0.16);
      }

      .choice-btn:disabled {
        cursor: default;
      }

      .choice-letter {
        width: 50px;
        height: 50px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: #ff6f91;
        color: #ffffff;
        font-size: 1.25rem;
        box-shadow: inset 0 -5px 0 rgba(0, 0, 0, 0.12);
      }

      .choice-word {
        min-width: 0;
        overflow-wrap: anywhere;
        font-size: 2rem;
        line-height: 1.1;
        color: #14345f;
      }

      .choice-icon {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: #eaf6ff;
        color: #3478ff;
      }

      .choice-correct {
        border-color: #20c997;
        background: #dcfff3;
      }

      .choice-correct .choice-letter {
        background: #20c997;
      }

      .choice-wrong {
        border-color: #ff5a76;
        background: #fff0f4;
      }

      .choice-wrong .choice-letter {
        background: #ff5a76;
      }

      .feedback-area {
        margin-top: 14px;
      }

      .feedback-box {
        padding: 16px;
        border-radius: 8px;
        border: 4px solid #ffffff;
        background: rgba(255, 255, 255, 0.88);
        color: #14345f;
        box-shadow: 0 12px 24px var(--shadow);
      }

      .feedback-box p {
        margin: 0;
      }

      .feedback-title {
        font-family: "Sarabun", "Nunito", sans-serif;
        font-size: 1.25rem;
        line-height: 1.42;
      }

      .lesson {
        margin-top: 8px !important;
        color: #36536f;
        line-height: 1.55;
        font-weight: 700;
      }

      .next-row {
        margin-top: 14px;
        display: flex;
        justify-content: flex-end;
      }

      .next-btn {
        min-height: 50px;
        padding: 0 18px;
        border: 0;
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        color: #ffffff;
        background: #3478ff;
        box-shadow: 0 8px 0 #1d55bd, 0 14px 22px rgba(26, 76, 155, 0.24);
        transition: transform 160ms ease, box-shadow 160ms ease;
      }

      .next-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 11px 0 #1d55bd, 0 18px 26px rgba(26, 76, 155, 0.28);
      }

      .next-btn:active {
        transform: translateY(3px);
        box-shadow: 0 5px 0 #1d55bd, 0 10px 18px rgba(26, 76, 155, 0.24);
      }

      .result-panel {
        width: min(720px, 100%);
        padding: 28px;
        text-align: center;
      }

      .result-graphic {
        width: min(360px, 100%);
        margin: 0 auto 8px;
      }

      .result-title {
        margin: 0;
        color: #12366d;
        font-size: 3rem;
        line-height: 1.05;
        text-shadow: 0 3px 0 rgba(255, 255, 255, 0.85);
      }

      .result-score {
        margin: 10px 0 6px;
        font-family: "Sarabun", "Nunito", sans-serif;
        font-size: 1.45rem;
        color: #c01855;
      }

      .result-message {
        margin: 0 0 18px;
        font-family: "Sarabun", "Nunito", sans-serif;
        color: #24415f;
        font-size: 1.22rem;
        line-height: 1.55;
      }

      .lesson-list {
        margin: 0 0 20px;
        padding: 0;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        list-style: none;
        text-align: left;
      }

      .lesson-list li {
        min-height: 58px;
        padding: 10px 12px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        gap: 10px;
        background: #f0fbff;
        border: 3px solid #ffffff;
        color: #24415f;
      }

      .lesson-dot {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        color: #14345f;
        background: #ffd84d;
      }

      .fade-in {
        animation: fadeIn 360ms ease both;
      }

      .correct-flash {
        animation: correctPulse 520ms ease;
      }

      .wrong-shake {
        animation: shake 420ms ease;
      }

      .star-pop {
        animation: starPop 540ms ease both;
      }

      .float-star {
        position: absolute;
        pointer-events: none;
        left: calc(50% - 14px);
        top: 20%;
        font-size: 2rem;
        animation: floatStar 900ms ease forwards;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes correctPulse {
        0%,
        100% {
          transform: scale(1);
        }
        45% {
          transform: scale(1.04);
        }
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-8px);
        }
        75% {
          transform: translateX(8px);
        }
      }

      @keyframes starPop {
        0% {
          opacity: 0;
          transform: scale(0.35) rotate(-12deg);
        }
        70% {
          opacity: 1;
          transform: scale(1.08) rotate(4deg);
        }
        100% {
          transform: scale(1) rotate(0);
        }
      }

      @keyframes floatStar {
        from {
          opacity: 1;
          transform: translateY(0) scale(0.8) rotate(0);
        }
        to {
          opacity: 0;
          transform: translateY(-82px) scale(1.7) rotate(24deg);
        }
      }

      @media (max-width: 920px) {
        .start-shell,
        .level-board {
          grid-template-columns: 1fr;
        }

        .mascot-stage {
          min-height: auto;
        }

        .start-graphic {
          max-height: 420px;
        }

        .scene-panel {
          min-height: auto;
        }
      }

      @media (max-width: 680px) {
        .screen {
          padding: 16px;
        }

        .hero-title {
          font-size: 2.65rem;
        }

        .hero-subtitle {
          font-size: 1.28rem;
        }

        .info-grid,
        .lesson-list {
          grid-template-columns: 1fr 1fr;
        }

        .topbar {
          align-items: stretch;
        }

        .score-pill,
        .level-pill {
          flex: 1;
          justify-content: center;
          padding: 8px;
        }

        .question-strip {
          grid-template-columns: 1fr;
        }

        .phonetic-chip {
          width: 100%;
        }

        .level-title {
          font-size: 1.8rem;
        }

        .question-text {
          font-size: 1.32rem;
        }

        .choice-word {
          font-size: 1.6rem;
        }
      }

      @media (max-width: 450px) {
        .info-grid,
        .lesson-list {
          grid-template-columns: 1fr;
        }

        .choice-btn {
          grid-template-columns: 46px minmax(0, 1fr);
        }

        .choice-icon {
          display: none;
        }

        .choice-letter {
          width: 44px;
          height: 44px;
        }

        .hero-title {
          font-size: 2.25rem;
        }
      }
    </style>
  </head>
  <body class="h-full">
    <div id="app" class="app">
      <svg class="world-bg" viewBox="0 0 1440 900" preserveAspectRatio="none" aria-hidden="true">
        <path d="M0 610 C180 555 300 660 465 604 C640 545 765 630 925 588 C1120 538 1260 585 1440 540 V900 H0 Z" fill="#55c96f" opacity="0.9"/>
        <path d="M0 690 C260 620 430 720 650 668 C890 610 1070 690 1440 618 V900 H0 Z" fill="#2fb967" opacity="0.85"/>
        <path d="M1060 86 C1140 12 1268 14 1342 92" fill="none" stroke="#ff6f91" stroke-width="18" stroke-linecap="round"/>
        <path d="M1086 112 C1150 57 1258 58 1318 116" fill="none" stroke="#ffd84d" stroke-width="18" stroke-linecap="round"/>
        <path d="M1110 138 C1160 98 1240 100 1294 140" fill="none" stroke="#35d8aa" stroke-width="18" stroke-linecap="round"/>
        <g fill="#ffffff" opacity="0.82">
          <path d="M109 166 h154 a42 42 0 0 0 -42 -42 h-14 a59 59 0 0 0 -107 5 h-4 a38 38 0 0 0 13 37Z"/>
          <path d="M802 134 h180 a42 42 0 0 0 -37 -62 h-21 a66 66 0 0 0 -118 14 a38 38 0 0 0 -4 48Z"/>
          <path d="M410 86 h138 a34 34 0 0 0 -30 -50 h-17 a53 53 0 0 0 -95 11 a31 31 0 0 0 4 39Z"/>
        </g>
      </svg>

      <section id="screen-start" class="screen start-screen fade-in">
        <div class="start-shell">
          <div class="hero-copy">
            <div class="brand-chip">
              <i data-lucide="sparkles" aria-hidden="true"></i>
              <span>Primary Phonics Game</span>
            </div>
            <h1 id="mainTitle" class="hero-title">Phonics Adventure</h1>
            <p class="hero-subtitle">ภารกิจเมืองเสียงแสนสนุก</p>
            <p class="hero-note">
              ช่วย <span id="heroNameStart" class="hero-name">น้องบี</span> เก็บดาวเสียงผ่าน 5 ด่าน
              ฝึกฟังเสียงต้นคำ เสียงสระ และการประสมคำแบบสดใสเหมาะกับเด็กประถม
            </p>

            <div class="info-grid" aria-label="ข้อมูลเกม">
              <div class="info-tile">
                <span class="tile-icon"><i data-lucide="clock-3" aria-hidden="true"></i></span>
                <strong>10-15 นาที</strong>
              </div>
              <div class="info-tile">
                <span class="tile-icon coral"><i data-lucide="star" aria-hidden="true"></i></span>
                <strong>คะแนนเต็ม 10</strong>
              </div>
              <div class="info-tile">
                <span class="tile-icon mint"><i data-lucide="check" aria-hidden="true"></i></span>
                <strong>ถูก +2 คะแนน</strong>
              </div>
              <div class="info-tile">
                <span class="tile-icon blue"><i data-lucide="refresh-cw" aria-hidden="true"></i></span>
                <strong>เล่นซ้ำได้</strong>
              </div>
            </div>

            <button type="button" onclick="startGame()" class="primary-cta">
              <i data-lucide="play" aria-hidden="true"></i>
              เริ่มเกม
            </button>
          </div>

          <figure class="mascot-stage" aria-label="ภาพกราฟิกเด็กนักเรียนในเมืองเสียง">
            <svg class="start-graphic" viewBox="0 0 420 500" role="img" aria-labelledby="startGraphicTitle">
              <title id="startGraphicTitle">เด็กนักเรียนกับเมือง Phonics สีสันสดใส</title>

        }

      function startGame() {

        currentLevel = 0;

        document.getElementById("screen-game").classList.remove("hidden");
        renderLevel();
      }

      function renderLevel() {
        const lv = levels[currentLevel];
        document.getElementById("scoreDisplay").textContent = score;
        document.getElementById("levelNum").textContent = currentLevel + 1;
        document.getElementById("progressBar").style.width = `${(currentLevel / levels.length) * 100}%`;

        const container = document.getElementById("levelContent");
        container.className = "level-content fade-in";
        container.innerHTML = `
          <div class="level-board">
            <aside class="scene-panel">
              <div class="scene-label">
                <span>${lv.tag}</span>
                <span class="sound-badge">${lv.phonetic}</span>
              </div>
              ${sceneGraphics[lv.scene]}
            </aside>
            <section class="quiz-area" aria-labelledby="levelTitle">
              <div class="mission-tag">${icon("flag")} ภารกิจที่ ${currentLevel + 1}</div>
              <h2 id="levelTitle" class="level-title">${lv.title}</h2>
              <p class="level-subtitle">${lv.subtitle}</p>
              <div class="question-strip">
                <p class="question-text">${lv.question}</p>
                <p class="phonetic-chip">${lv.phonetic}</p>
              </div>
              <div class="choices" id="choicesContainer">
                ${lv.choices.map((choice, index) => `
                  <button type="button" onclick="selectAnswer(${index})" id="choice-${index}" class="choice-btn">
                    <span class="choice-letter">${choice.label}</span>
                    <span class="choice-word">${choice.text}</span>
                    <span class="choice-icon">${icon("volume-2")}</span>
                  </button>
                `).join("")}
              </div>
              <div id="feedbackArea" class="feedback-area"></div>
            </section>
          </div>
        `;
        refreshIcons();
      }

      function selectAnswer(index) {
        const lv = levels[currentLevel];
        const choice = lv.choices[index];
        const buttons = document.querySelectorAll("#choicesContainer button");
        buttons.forEach((button) => {
          button.disabled = true;
          button.style.pointerEvents = "none";
        });

        const selectedButton = document.getElementById(`choice-${index}`);
        selectedButton.style.position = "relative";

        if (choice.correct) {
          score += 2;
          document.getElementById("scoreDisplay").textContent = score;
          selectedButton.classList.add("choice-correct", "correct-flash");
          selectedButton.insertAdjacentHTML("beforeend", '<span class="float-star">★</span>');
        } else {
          selectedButton.classList.add("choice-wrong", "wrong-shake");
          lv.choices.forEach((item, choiceIndex) => {
            if (item.correct) {
              document.getElementById(`choice-${choiceIndex}`).classList.add("choice-correct");
            }
          });
        }

        const feedback = document.getElementById("feedbackArea");
        feedback.innerHTML = `
          <div class="feedback-box fade-in">
            <p class="feedback-title">${choice.correct ? "ถูกต้อง!" : "ลองสังเกตเสียงอีกนิด"} ${choice.feedback}</p>
            <p class="lesson">บทเรียน: ${lv.lesson}</p>
            <div class="next-row">
              <button type="button" onclick="nextLevel()" class="next-btn">
                ${currentLevel < levels.length - 1 ? "ด่านถัดไป" : "ดูผลคะแนน"}
                ${icon(currentLevel < levels.length - 1 ? "arrow-right" : "trophy")}
              </button>
            </div>
          </div>
        `;
        refreshIcons();
      }

      function nextLevel() {
        currentLevel += 1;
        if (currentLevel >= levels.length) {
          showResult();
        } else {
          renderLevel();
        }
      }

      function resultGraphic(rankColor) {
        return `
          <svg class="result-graphic star-pop" viewBox="0 0 360 220" role="img" aria-label="ถ้วยรางวัลและดาว">
            <rect x="34" y="22" width="292" height="170" rx="16" fill="#dff8ff"/>
            <path d="M59 157 C98 132 143 164 184 137 C230 106 267 151 304 126 V192 H59 Z" fill="#74d96f"/>
            <path d="M160 59 h40 v88 h-40 Z" fill="${rankColor}"/>
            <path d="M132 50 h96 v34 c0 43 -22 70 -48 70 s-48 -27 -48 -70 Z" fill="#ffd84d" stroke="#173a6a" stroke-width="5"/>
            <path d="M132 66 h-35 c2 36 20 55 51 59" fill="none" stroke="#173a6a" stroke-width="9" stroke-linecap="round"/>
            <path d="M228 66 h35 c-2 36 -20 55 -51 59" fill="none" stroke="#173a6a" stroke-width="9" stroke-linecap="round"/>
            <rect x="135" y="147" width="90" height="26" rx="8" fill="#173a6a"/>
            <rect x="117" y="171" width="126" height="22" rx="8" fill="#3478ff"/>
            <text x="180" y="106" text-anchor="middle" font-family="Nunito, sans-serif" font-size="37" font-weight="900" fill="#173a6a">★</text>
            <path d="M87 48 l8 16 18 3 -13 12 3 18 -16 -8 -16 8 3 -18 -13 -12 18 -3 Z" fill="#ff6f91"/>
            <path d="M278 42 l9 18 20 3 -15 14 4 20 -18 -10 -18 10 4 -20 -15 -14 20 -3 Z" fill="#35d8aa"/>
          </svg>
        `;
      }

      function showResult() {
        document.getElementById("screen-game").classList.add("hidden");
        document.getElementById("screen-result").classList.remove("hidden");
        document.getElementById("progressBar").style.width = "100%";

        let rank;
        let message;
        let rankColor;
        if (score >= 8) {
          rank = "Sound Hero";
          message = "เก่งมาก! ฟังเสียงและเลือกคำได้แม่นมาก";
          rankColor = "#20c997";
        } else if (score >= 5) {
          rank = "Good Listener";
          message = "ดีมาก! ฝึกอีกนิดจะฟังเสียงได้คล่องขึ้น";
          rankColor = "#3478ff";
        } else {
          rank = "Keep Trying";
          message = "ไม่เป็นไรนะ ลองเล่นใหม่แล้วค่อย ๆ ฟังเสียงทีละคำ";
          rankColor = "#ff6f91";
        }

        const heroName = config.hero_name || defaultConfig.hero_name;
        document.getElementById("resultContent").innerHTML = `
          ${resultGraphic(rankColor)}
          <h2 class="result-title">${rank}</h2>
          <p class="result-score">${heroName} ได้ ${score}/10 คะแนน</p>
          <p class="result-message">${message}</p>
          <ul class="lesson-list" aria-label="บทเรียนที่ได้">
            <li><span class="lesson-dot">${icon("volume-2")}</span>เสียงพยัญชนะ b, c, d</li>
            <li><span class="lesson-dot">${icon("ear")}</span>แยกเสียงสระ a, i, o</li>
            <li><span class="lesson-dot">${icon("blocks")}</span>ประสมเสียงเป็นคำ</li>
            <li><span class="lesson-dot">${icon("sparkles")}</span>ฟังเสียงคำอย่างตั้งใจ</li>
          </ul>
          <button type="button" onclick="startGame()" class="secondary-cta">
            ${icon("rotate-ccw")} เล่นอีกครั้ง
          </button>
        `;
        refreshIcons();
      }

      function applyConfig(nextConfig) {
        const title = nextConfig.game_title || defaultConfig.game_title;
        const hero = nextConfig.hero_name || defaultConfig.hero_name;
        const sky = nextConfig.background_color || defaultConfig.background_color;
        const primary = nextConfig.primary_surface || defaultConfig.primary_surface;
        const secondary = nextConfig.secondary_surface || defaultConfig.secondary_surface;
        const textColor = nextConfig.text_color || defaultConfig.text_color;
        const action = nextConfig.primary_action || defaultConfig.primary_action;
        const mint = nextConfig.secondary_action || defaultConfig.secondary_action;

        document.documentElement.style.setProperty("--sky", sky);
        document.documentElement.style.setProperty("--sun", primary);
        document.documentElement.style.setProperty("--coral", secondary);
        document.documentElement.style.setProperty("--ink", textColor);
        document.documentElement.style.setProperty("--blue", action);
        document.documentElement.style.setProperty("--mint", mint);

        document.getElementById("mainTitle").textContent = title;
        const heroStart = document.getElementById("heroNameStart");
        if (heroStart) heroStart.textContent = hero;

        const font = nextConfig.font_family || defaultConfig.font_family;
        document.body.style.fontFamily = `${font}, Nunito, Sarabun, system-ui, sans-serif`;
        document.body.style.fontSize = `${nextConfig.font_size || defaultConfig.font_size}px`;
      }

      if (window.elementSdk) {
        window.elementSdk.init({
          defaultConfig,
          onConfigChange: async (cfg) => {
            config = { ...defaultConfig, ...cfg };
            applyConfig(config);
          },
          mapToCapabilities: (cfg) => ({
            recolorables: [
              { get: () => cfg.background_color || defaultConfig.background_color, set: (value) => { cfg.background_color = value; window.elementSdk.setConfig({ background_color: value }); } },
              { get: () => cfg.primary_surface || defaultConfig.primary_surface, set: (value) => { cfg.primary_surface = value; window.elementSdk.setConfig({ primary_surface: value }); } },
              { get: () => cfg.secondary_surface || defaultConfig.secondary_surface, set: (value) => { cfg.secondary_surface = value; window.elementSdk.setConfig({ secondary_surface: value }); } },
              { get: () => cfg.text_color || defaultConfig.text_color, set: (value) => { cfg.text_color = value; window.elementSdk.setConfig({ text_color: value }); } },
              { get: () => cfg.primary_action || defaultConfig.primary_action, set: (value) => { cfg.primary_action = value; window.elementSdk.setConfig({ primary_action: value }); } }
            ],
            borderables: [],
            fontEditable: {
              get: () => cfg.font_family || defaultConfig.font_family,
              set: (value) => { cfg.font_family = value; window.elementSdk.setConfig({ font_family: value }); }
            },
            fontSizeable: {
              get: () => cfg.font_size || defaultConfig.font_size,
              set: (value) => { cfg.font_size = value; window.elementSdk.setConfig({ font_size: value }); }
            }
          }),
          mapToEditPanelValues: (cfg) => new Map([
            ["game_title", cfg.game_title || defaultConfig.game_title],
            ["hero_name", cfg.hero_name || defaultConfig.hero_name]
          ])
        });
      } else {
        applyConfig(defaultConfig);
      }

      refreshIcons();
    </script>
  </body>
</html>
